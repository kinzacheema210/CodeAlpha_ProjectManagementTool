<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Board - CodeAlpha PM Tool</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <div class="logo"><a href="/dashboard.html" style="color:#fff;text-decoration:none">📋 CodeAlpha PM Tool</a></div>
  <nav id="nav-auth"></nav>
</header>
<main>
  <div class="card" id="projectHeader">Loading project...</div>

  <div class="card">
    <h3>Add a Task</h3>
    <form id="taskForm">
      <input type="text" id="taskTitle" placeholder="Task title" required>
      <textarea id="taskDesc" placeholder="Description (optional)" rows="2"></textarea>
      <select id="taskAssignee"><option value="">Unassigned</option></select>
      <button type="submit">Add Task</button>
      <p id="taskMsg"></p>
    </form>
  </div>

  <div class="board" id="board">
    <div class="column" data-status="todo"><h3>📝 To Do</h3><div class="cards"></div></div>
    <div class="column" data-status="in_progress"><h3>🚧 In Progress</h3><div class="cards"></div></div>
    <div class="column" data-status="done"><h3>✅ Done</h3><div class="cards"></div></div>
  </div>
</main>

<div id="taskModalBackdrop" class="modal-backdrop" style="display:none">
  <div class="modal" id="taskModal"></div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/board.js"></script>
</body>
</html>
